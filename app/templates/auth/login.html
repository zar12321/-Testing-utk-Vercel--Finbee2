{% extends "base.html" %}

{% block title %}
Login - FinBee
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow">

                <div class="card-body p-4">

                    <h2 class="text-center mb-4">
                        🐝 FinBee Login
                    </h2>

                    <form
                        method="post"
                        action="/auth/login"
                    >

                        <div class="mb-3">

                            <label class="form-label">
                                Email / Username
                            </label>

                            <input
                                type="text"
                                name="login_identifier"
                                class="form-control"
                                required
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Password
                            </label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                required
                            >

                        </div>
                        

                        <button
                            type="submit"
                            class="btn btn-success w-100"
                        >
                            Login
                        </button>

                    </form>

                    <hr>

                    <div class="text-center">

                        <a href="/auth/register">
                            Register
                        </a>

                        |

                        <a href="/auth/reset-password">
                            Reset Password
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
