<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">

<meta 
    name="viewport" 
    content="width=device-width, initial-scale=1.0"
>

<title>Reset Password - FinBee</title>

<link  
    rel="icon"
    type="image/png"
    href="/static/images/FinBee Icon.PNG"
>

<link
    rel="stylesheet"
    href="/static/css/auth.css"
>

<link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>

<style>

.validation-msg{
    font-size:14px;
    font-weight:600;
    margin-top:4px;
}

</style>

</head>


<body>


<div class="auth-container">

    <div class="auth-card">

        <div class="auth-header">

            <h1>
                Reset Password
            </h1>

        </div>


        <form
            method="POST"
            action="/auth/reset-password"
            class="auth-form"
        >


            <div class="form-group">

                <input
                    type="text"
                    name="login_identifier"
                    placeholder="Email atau Username"
                    required
                >

            </div>

            <div class="form-group password-wrapper">

                <input
                    type="password"
                    id="newPassword"
                    name="new_password"
                    placeholder="Password Baru"
                    required
                >

                <button
                    type="button"
                    class="toggle-password"
                    data-target="newPassword"
                >
                    <i class="fa-solid fa-eye"></i>
                </button>

                <div
                    id="passwordMsg"
                    class="validation-msg"
                ></div>

            </div>

            <div class="form-group password-wrapper">

                <input
                    type="password"
                    id="confirmPassword"
                    name="confirm_password"
                    placeholder="Konfirmasi Password Baru"
                    required
                >

                <button
                    type="button"
                    class="toggle-password"
                    data-target="confirmPassword"
                >
                    <i class="fa-solid fa-eye"></i>
                </button>

                <div
                    id="confirmMsg"
                    class="validation-msg"
                ></div>

            </div>

            <button
                type="submit"
                class="btn-login"
            >
                Reset Password
            </button>


        </form>


        <div class="auth-links">

            <a href="/auth/login">
                Kembali ke Login
            </a>

        </div>


    </div>


</div>



<script>


document.addEventListener(
    "DOMContentLoaded",
    () => {

        const form =
            document.querySelector(
                ".auth-form"
            );

        const password =
            document.getElementById(
                "newPassword"
            );

        const confirmPassword =
            document.getElementById(
                "confirmPassword"
            );

        const passwordMsg =
            document.getElementById(
                "passwordMsg"
            );

        const confirmMsg =
            document.getElementById(
                "confirmMsg"
            );

        function showToast(
            message,
            isError = false
        ){

            const toast =
                document.getElementById(
                    "success-toast"
                );

            const text =
                document.getElementById(
                    "toast-message"
                );

            text.textContent =
                message;

            toast.classList.remove(
                "error"
            );

            if(isError){

                toast.classList.add(
                    "error"
                );

            }

            toast.classList.add(
                "show"
            );

            setTimeout(
                () => {

                    toast.classList.remove(
                        "show"
                    );

                },
                3000
            );

        }

        function validatePassword(){

            const value =
                password.value.trim();

            if(value === ""){

                passwordMsg.innerHTML =
                    "";

                return false;

            }

            if(value.length < 8){

                passwordMsg.style.color =
                    "red";

                passwordMsg.innerHTML =
                    "✗ Password minimal 8 karakter";

                return false;

            }

            passwordMsg.style.color =
                "green";

            passwordMsg.innerHTML =
                "✓ Password memenuhi syarat";

            return true;

        }

        function validateConfirm(){

            const value =
                confirmPassword.value.trim();

            if(value === ""){

                confirmMsg.innerHTML =
                    "";

                return false;

            }

            if(
                password.value !== value
            ){

                confirmMsg.style.color =
                    "red";

                confirmMsg.innerHTML =
                    "✗ Password tidak sama";

                return false;

            }

            confirmMsg.style.color =
                "green";

            confirmMsg.innerHTML =
                "✓ Password sesuai";

            return true;

        }

        password.addEventListener(
            "input",
            () => {

                validatePassword();
                validateConfirm();

            }
        );

        confirmPassword.addEventListener(
            "input",
            validateConfirm
        );

        document
            .querySelectorAll(
                ".toggle-password"
            )
            .forEach(
                button => {

                    button.addEventListener(
                        "click",
                        () => {

                            const input =
                                document.getElementById(
                                    button.dataset.target
                                );

                            const icon =
                                button.querySelector(
                                    "i"
                                );

                            const isPassword =
                                input.type ===
                                "password";

                            input.type =
                                isPassword
                                    ? "text"
                                    : "password";

                            icon.className =
                                isPassword
                                    ? "fa-solid fa-eye-slash"
                                    : "fa-solid fa-eye";

                        }
                    );

                }
            );

        form.addEventListener(
            "submit",
            (e) => {

                const validPassword =
                    validatePassword();

                const validConfirm =
                    validateConfirm();

                if(
                    !validPassword ||
                    !validConfirm
                ){

                    e.preventDefault();

                    showToast(
                        "Periksa kembali password.",
                        true
                    );

                }

            }
        );

    }
);



</script>

<div
    id="success-toast"
    class="toast-success"
>
    <span id="toast-message"></span>
</div>

</body>

</html>
