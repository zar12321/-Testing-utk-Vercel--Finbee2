<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta 
        name="viewport" 
        content="width=device-width, initial-scale=1.0"
    >

    <title>Register - FinBee</title>

    <link 
        rel="icon"
        type="image/png"
        href="/static/images/FinBee Icon.PNG"
    >

    <link 
        rel="stylesheet" 
        href="/static/css/auth.css"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <style>

        .validation-msg {
            font-size: 14px;
            font-weight: 600;
            margin-top: 5px;
            min-height: 18px;
        }

        .error-box-register {
            margin-top: 12px;
            padding: 12px;
            border-radius: 10px;
            background: #ffe5e5;
            color: #d32f2f;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
        }

    </style>

</head>


<body>


<div class="auth-container">

    <div class="auth-card register-card">


        <div class="auth-header">

            <h1>
                Register
            </h1>

        </div>



        <form 
            method="POST"
            action="/auth/register"
            class="auth-form"
        >


            <input 
                type="hidden"
                name="login_type"
                value="username"
            >

            <div class="form-group">

                <input
                    type="text"
                    name="nama"
                    value="{{ nama if nama else '' }}"
                    placeholder="Nama Lengkap"
                    required
                >

            </div>

            <div class="form-group">

                <input
                    type="text"
                    id="username"
                    name="login_identifier"
                    value="{{ login_identifier if login_identifier else '' }}"
                    placeholder="Username"
                    required
                >


                <div 
                    id="usernameMsg"
                    class="validation-msg"
                ></div>


            </div>


            <div class="form-group password-wrapper"> 
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Password"
                    required
                >

                <button
                    type="button"
                    class="toggle-password"
                    data-target="password"
                >
                    <i class="fa-solid fa-eye"></i>
                </button>

                <div 
                id="passwordMsg"
                class="validation-msg"
                ></div>
            </div>

            <div class="form-group password-wrapper">
                <input
                    type="password"
                    id="confirmPassword"
                    name="confirm_password"
                    placeholder="Konfirmasi Password"
                    required
                >

                <button
                    type="button"
                    class="toggle-password"
                    data-target="confirmPassword"
                >
                    <i class="fa-solid fa-eye"></i>
                </button>

                <div 
                id="confirmMsg"
                class="validation-msg"
                ></div>
            </div>

            <div class="double-input">
                <div class="form-group">
                    <input
                        type="number"
                        name="umur"
                        value="{{ umur if umur else '' }}"
                        placeholder="Umur"
                    >
                </div>

                <div class="form-group">
                    <input
                        type="text"
                        id="pekerjaan"
                        name="pekerjaan"
                        value="{{ pekerjaan if pekerjaan else '' }}"
                        placeholder="Pekerjaan"
                    >
                </div>
            </div>

            <button
                type="submit"
                class="btn-login"
            >
                Register
            </button>

        </form>


        <div class="auth-links">


            <a href="/auth/login">

                Sudah punya akun?

            </a>



            <span>
                •
            </span>




            <a href="/auth/reset-password">

                Lupa Password?

            </a>



        </div>



    </div>

</div>

<script>

// =====================================
// TOGGLE PASSWORD
// =====================================

document
.querySelectorAll(".toggle-password")
.forEach(button => {

    button.addEventListener(
        "click",
        () => {

            const input =
                document.getElementById(
                    button.dataset.target
                );

            const icon =
                button.querySelector("i");

            const isPassword =
                input.type === "password";

            input.type =
                isPassword
                    ? "text"
                    : "password";

            icon.className =
                isPassword
                    ? "fa-solid fa-eye-slash"
                    : "fa-solid fa-eye";

        }
    );

});


// =====================================
// TOAST
// =====================================

function showToast(
    message,
    isError = false
){

    const toast =
        document.getElementById(
            "success-toast"
        );

    const text =
        document.getElementById(
            "toast-message"
        );

    text.textContent =
        message;

    toast.classList.remove(
        "error"
    );

    if(isError){

        toast.classList.add(
            "error"
        );

    }

    toast.classList.add(
        "show"
    );

    setTimeout(
        () => {

            toast.classList.remove(
                "show"
            );

        },
        3000
    );

}


// =====================================
// ELEMENT
// =====================================

const username =
    document.getElementById(
        "username"
    );

const usernameMsg =
    document.getElementById(
        "usernameMsg"
    );

const password =
    document.getElementById(
        "password"
    );

const confirmPassword =
    document.getElementById(
        "confirmPassword"
    );

const passwordMsg =
    document.getElementById(
        "passwordMsg"
    );

const confirmMsg =
    document.getElementById(
        "confirmMsg"
    );

const pekerjaan =
    document.getElementById(
        "pekerjaan"
    );


// =====================================
// USERNAME VALIDATION
// =====================================

let usernameTimer;

let usernameAvailable =
    false;

username.addEventListener(
    "input",
    () => {

        clearTimeout(
            usernameTimer
        );

        usernameAvailable =
            false;

        usernameTimer =
            setTimeout(
                async () => {

                    const value =
                        username.value.trim();

                    if(
                        value.length < 3
                    ){

                        usernameMsg.style.color =
                            "red";

                        usernameMsg.innerHTML =
                            "✗ Username minimal 3 karakter";

                        return;
                    }

                    try{

                        const response =
                            await fetch(
                                `/auth/check-username?login_identifier=${encodeURIComponent(value)}`
                            );

                        const data =
                            await response.json();

                        if(
                            data.available
                        ){

                            usernameAvailable =
                                true;

                            usernameMsg.style.color =
                                "green";

                            usernameMsg.innerHTML =
                                "✓ Username dapat digunakan";

                        }
                        else{

                            usernameAvailable =
                                false;

                            usernameMsg.style.color =
                                "red";

                            usernameMsg.innerHTML =
                                "✗ Username sudah digunakan";

                        }

                    }
                    catch(error){

                        usernameAvailable =
                            false;

                        usernameMsg.style.color =
                            "red";

                        usernameMsg.innerHTML =
                            "✗ Gagal memeriksa username";

                    }

                },
                400
            );

    }
);


// =====================================
// PASSWORD VALIDATION
// =====================================

function validatePassword(){

    if(
        password.value.trim() === ""
    ){

        passwordMsg.innerHTML =
            "";

        return false;
    }

    if(
        password.value.length < 8
    ){

        passwordMsg.style.color =
            "red";

        passwordMsg.innerHTML =
            "✗ Password minimal 8 karakter";

        return false;
    }

    passwordMsg.style.color =
        "green";

    passwordMsg.innerHTML =
        "✓ Password memenuhi syarat";

    return true;
}


function validateConfirmPassword(){

    if(
        confirmPassword.value.trim() === ""
    ){

        confirmMsg.innerHTML =
            "";

        return false;
    }

    if(
        password.value !==
        confirmPassword.value
    ){

        confirmMsg.style.color =
            "red";

        confirmMsg.innerHTML =
            "✗ Password tidak sama";

        return false;
    }

    confirmMsg.style.color =
        "green";

    confirmMsg.innerHTML =
        "✓ Password sesuai";

    return true;
}


password.addEventListener(
    "input",
    () => {

        validatePassword();
        validateConfirmPassword();

    }
);

confirmPassword.addEventListener(
    "input",
    validateConfirmPassword
);


// =====================================
// PEKERJAAN
// =====================================

pekerjaan.addEventListener(
    "input",
    function(){

        this.value =
            this.value.replace(
                /[^A-Za-z\s]/g,
                ""
            );

    }
);


// =====================================
// FORM SUBMIT
// =====================================

document
.querySelector(".auth-form")
.addEventListener(
    "submit",
    function(e){

        let valid = true;

        if(
            username.value.trim().length < 3
        ){

            usernameMsg.style.color =
                "red";

            usernameMsg.innerHTML =
                "✗ Username minimal 3 karakter";

            valid = false;
        }

        if(
            !usernameAvailable
        ){

            valid = false;
        }

        if(
            !validatePassword()
        ){

            valid = false;
        }

        if(
            !validateConfirmPassword()
        ){

            valid = false;
        }

        if(!valid){

            e.preventDefault();

            showToast(
                "Periksa kembali data registrasi.",
                true
            );

        }

    }
);

</script>

<div
    id="success-toast"
    class="toast-success"
>
    <span id="toast-message"></span>
</div>

</body>

</html>
