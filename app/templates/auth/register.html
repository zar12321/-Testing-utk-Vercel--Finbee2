<!DOCTYPE html>

<html lang="en">

<head>


<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>Register - FinBee</title>

<link
    rel="stylesheet"
    href="/static/css/auth.css"
>


</head>

<body>


<div class="auth-container">

    <div class="auth-card register-card">

        <div class="auth-header">

            <div class="logo">
                🐝
            </div>

            <h1>
                FinBee Register
            </h1>

        </div>

        <form
            method="POST"
            action="/auth/register"
            class="auth-form"
        >

            <div class="form-group">

                <input
                    type="text"
                    name="nama"
                    placeholder="Nama Lengkap"
                    required
                >

            </div>

            <div class="form-group">

                <input
                    type="text"
                    name="login_identifier"
                    placeholder="Email atau Username"
                    required
                >

            </div>

            <div class="form-group">

                <select
                    name="login_type"
                >

                    <option value="email">
                        Email
                    </option>

                    <option value="username">
                        Username
                    </option>

                </select>

            </div>

            <div class="form-group password-wrapper">

                <input
                    type="password"
                    id="newPassword"
                    name="password"
                    placeholder="Password"
                    required
                >

                <span
                    class="toggle-password"
                    onclick="togglePassword('newPassword', this)"
                >
                    👁️
                </span>

            </div>

            <div class="form-group password-wrapper">

                <input
                    type="password"
                    id="confirmPassword"
                    name="confirm_password"
                    placeholder="Konfirmasi Password"
                    required
                >

                <span 
                    class="toggle-password"
                    onclick="togglePassword('confirmPassword', this)"
                >
                    👁️
                </span>

            </div>

            <div class="double-input">

                <div class="form-group">

                    <input
                        type="number"
                        name="umur"
                        placeholder="Umur"
                    >

                </div>

                <div class="form-group">

                    <input
                        type="text"
                        name="pekerjaan"
                        placeholder="Pekerjaan"
                    >

                </div>

            </div>

            <button
                type="submit"
                class="btn-login"
            >
                Register
            </button>

        </form>

        <div class="auth-links">

            <a href="/auth/login">
                Sudah punya akun?
            </a>

            <span>•</span>

            <a href="/auth/reset-password">
                Lupa Password?
            </a>

        </div>

    </div>

</div>

<script>

    function togglePassword(inputId, icon){

        const input =
            document.getElementById(inputId);

        if(input.type === "password"){

            input.type = "text";
            icon.innerHTML = "🙈";

        }else{

            input.type = "password";
            icon.innerHTML = "👁️";

        }
    }

    const usernameInput = document.querySelector('input[name="login_identifier"]');
    const usernameMsg = document.createElement("div");
    usernameMsg.style.fontSize = "12px";
    usernameMsg.style.marginTop = "5px";
    usernameInput.parentNode.appendChild(usernameMsg);

    let timeout = null;

    usernameInput.addEventListener("input", function () {

        clearTimeout(timeout);

        timeout = setTimeout(async () => {

            const username = usernameInput.value;

            if (username.length < 3) {
                usernameMsg.innerHTML = "";
                return;
            }

            const res = await fetch(`/auth/check-username?login_identifier=${username}`);
            const data = await res.json();

            if (data.available) {
                usernameMsg.style.color = "green";
                usernameMsg.innerHTML = "✓ Username dapat digunakan";
            } else {
                usernameMsg.style.color = "red";
                usernameMsg.innerHTML = "✗ Username tidak dapat digunakan";
            }

        }, 400);

    });

    const pass = document.querySelector('input[name="password"]');
    const confirmPass = document.querySelector('input[name="confirm_password"]');

    const msg = document.createElement("div");
    msg.style.fontSize = "12px";
    msg.style.marginTop = "5px";
    confirmPass.parentNode.appendChild(msg);

    function checkPassword() {

        if (confirmPass.value === "") {
            msg.innerHTML = "";
            return;
        }

        if (pass.value === confirmPass.value) {
            msg.style.color = "green";
            msg.innerHTML = "✓ Password sesuai";
        } else {
            msg.style.color = "red";
            msg.innerHTML = "✗ Password tidak sama";
        }
    }

    pass.addEventListener("input", checkPassword);
    confirmPass.addEventListener("input", checkPassword);

</script>



</body>

</html>
