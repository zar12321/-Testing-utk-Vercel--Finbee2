<!DOCTYPE html>

<html lang="en">

<head>


<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>Register - FinBee</title>

<link
    rel="stylesheet"
    href="/static/css/auth.css"
>


</head>

<body>


<div class="auth-container">

    <div class="auth-card register-card">

        <div class="auth-header">

            <div class="logo">
                🐝
            </div>

            <h1>
                FinBee Register
            </h1>

        </div>

        <form
            method="POST"
            action="/auth/register"
            class="auth-form"
        >

            <div class="form-group">

                <input
                    type="text"
                    name="nama"
                    placeholder="Nama Lengkap"
                    required
                >

            </div>

            <div class="form-group">

                <input
                    type="text"
                    name="login_identifier"
                    placeholder="Email atau Username"
                    required
                >

            </div>

            <div class="form-group">

                <select
                    name="login_type"
                >

                    <option value="email">
                        Email
                    </option>

                    <option value="username">
                        Username
                    </option>

                </select>

            </div>

            <div class="form-group password-wrapper">

                <input
                    type="password"
                    id="newPassword"
                    name="password"
                    placeholder="Password"
                    required
                >

                <span
                    class="toggle-password"
                    onclick="togglePassword('newPassword', this)"
                >
                    👁️
                </span>

            </div>

            <div class="form-group password-wrapper">

                <input
                    type="password"
                    id="confirmPassword"
                    name="confirm_password"
                    placeholder="Konfirmasi Password"
                    required
                >

                <span 
                    class="toggle-password"
                    onclick="togglePassword('confirmPassword', this)"
                >
                    👁️
                </span>

            </div>

            <div class="double-input">

                <div class="form-group">

                    <input
                        type="number"
                        name="umur"
                        placeholder="Umur"
                    >

                </div>

                <div class="form-group">

                    <input
                        type="text"
                        name="pekerjaan"
                        placeholder="Pekerjaan"
                    >

                </div>

            </div>

            <button
                type="submit"
                class="btn-login"
            >
                Register
            </button>

        </form>

        <div class="auth-links">

            <a href="/auth/login">
                Sudah punya akun?
            </a>

            <span>•</span>

            <a href="/auth/reset-password">
                Lupa Password?
            </a>

        </div>

    </div>

</div>

<script>

    function togglePassword(inputId, icon){

        const input =
            document.getElementById(inputId);

        if(input.type === "password"){

            input.type = "text";
            icon.innerHTML = "🙈";

        }else{

            input.type = "password";
            icon.innerHTML = "👁️";

        }
    }

</script>


</body>

</html>
